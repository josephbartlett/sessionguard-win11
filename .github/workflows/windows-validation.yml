name: Windows Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Run Windows validation
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/ci/Invoke-WindowsValidation.ps1 -Configuration Debug

      - name: Publish validation summary
        if: always()
        run: |
          $summaryPath = "artifacts/ci/windows-validation/validation-summary.md"
          if (Test-Path $summaryPath) {
            Get-Content $summaryPath | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sessionguard-windows-validation-${{ github.run_id }}
          path: |
            artifacts/ci/windows-validation/**
          if-no-files-found: warn
